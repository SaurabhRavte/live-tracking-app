version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tracker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tracker-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tracker-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - tracker-net
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: tracker-postgres
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker_secret
      POSTGRES_DB: tracker_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tracker-server
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://tracker:tracker_secret@postgres:5432/tracker_db
      KAFKA_BROKERS: kafka:9092
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    networks:
      - tracker-net
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${CLIENT_API_URL:-http://localhost:4000}
        VITE_SOCKET_URL: ${CLIENT_SOCKET_URL:-http://localhost:4000}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: tracker-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - tracker-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tracker-net:
    driver: bridge
