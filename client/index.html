<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveTrack — Real-time Location</title>
    <meta name="description" content="Real-time location sharing and tracking" />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Leaflet popup dark override */
      .leaflet-popup-content-wrapper {
        background: #111111 !important;
        border: 1px solid #1e1e1e !important;
        border-radius: 8px !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6) !important;
        color: #f5f5f5 !important;
      }
      .leaflet-popup-tip {
        background: #111111 !important;
      }
      .leaflet-popup-close-button {
        color: #6b6b6b !important;
      }
      .leaflet-control-zoom a {
        background: #111111 !important;
        color: #f5f5f5 !important;
        border-color: #1e1e1e !important;
      }
      .leaflet-control-zoom a:hover {
        background: #1e1e1e !important;
      }
      .leaflet-control-attribution {
        background: rgba(10, 10, 10, 0.8) !important;
        color: #6b6b6b !important;
        font-size: 10px !important;
      }
      .leaflet-control-attribution a {
        color: #6b6b6b !important;
      }
    </style>
  </head>
  <body class="bg-canvas text-accent font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
